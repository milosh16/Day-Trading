name: Conviction Training

on:
  workflow_dispatch:
    inputs:
      trials:
        description: 'Number of trials to run'
        required: false
        default: '500'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/conviction-training
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "SIGNAL Training Bot"
          git config user.email "signal-bot@users.noreply.github.com"

      # Primary resume: pull state from repo (committed by prior runs)
      - name: Pull latest state from repo
        run: |
          git pull origin claude/conviction-training --rebase || true
          if [ -f training/results/training-state.json ]; then
            TRIALS=$(node -e "console.log(require('./training/results/training-state.json').currentTrial)" 2>/dev/null || echo "0")
            echo "Found state in repo: $TRIALS trials completed"
          else
            echo "No prior state in repo"
          fi

      # Backup resume: restore from Actions cache
      - name: Restore state from cache (backup)
        if: ${{ !hashFiles('training/results/training-state.json') }}
        uses: actions/cache/restore@v4
        with:
          path: training/results/
          key: conviction-training-state
          restore-keys: |
            conviction-training-

      - name: Show resume status
        run: |
          if [ -f training/results/training-state.json ]; then
            node -e "
              const s = require('./training/results/training-state.json');
              console.log('Resuming from trial', s.currentTrial, '/', s.totalTrials);
              console.log('Best score so far:', s.bestScore);
              console.log('Tokens used:', s.totalTokensUsed?.toLocaleString());
            "
          else
            echo "Starting fresh — no prior state found"
          fi

      - name: Run conviction training
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOTAL_TRIALS: ${{ github.event.inputs.trials || '500' }}
          CI: 'true'
        run: |
          echo "Starting conviction training ($TOTAL_TRIALS trials)..."
          npx tsx training/train.ts
        timeout-minutes: 350

      # Always save state — even on failure/timeout/cancellation
      - name: Save state to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: training/results/
          key: conviction-training-state-${{ github.run_id }}

      - name: Commit all results to repo
        if: always()
        run: |
          git pull origin claude/conviction-training --rebase || true
          git add training/results/training-diary.md \
                training/results/training-state.json \
                training/results/optimized-weights.json \
                training/results/conviction-update.ts 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TRIALS=$(node -e "try{console.log(require('./training/results/training-state.json').currentTrial)}catch{console.log('?')}" 2>/dev/null || echo "?")
            git commit -m "Training checkpoint: ${TRIALS} trials complete [auto-resume]"
            git push origin claude/conviction-training || echo "Push failed — results saved in artifacts"
          fi

      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-results-${{ github.run_id }}
          path: |
            training/results/training-state.json
            training/results/training-log.txt
            training/results/optimized-weights.json
            training/results/conviction-update.ts
            training/results/training-diary.md
          retention-days: 90

      - name: Check if training is complete
        id: check_complete
        if: always()
        run: |
          if [ -f training/results/training-state.json ]; then
            node -e "
              const s = require('./training/results/training-state.json');
              const target = parseInt(process.env.TOTAL_TRIALS || '500');
              console.log('Trials:', s.currentTrial, '/', target);
              if (s.currentTrial < target) {
                console.log('INCOMPLETE — needs another run');
                process.exit(1);
              } else {
                console.log('COMPLETE');
              }
            "
            echo "complete=true" >> $GITHUB_OUTPUT
          else
            echo "complete=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOTAL_TRIALS: ${{ github.event.inputs.trials || '500' }}
        continue-on-error: true

      # Auto-restart if not finished (rate limit, timeout, error)
      - name: Auto-restart training if incomplete
        if: always() && steps.check_complete.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Training incomplete — triggering auto-restart in 60 seconds..."
          sleep 60
          gh workflow run train-conviction.yml \
            --ref claude/conviction-training \
            -f trials=${{ github.event.inputs.trials || '500' }} \
            || echo "Could not auto-restart. Trigger manually at: https://github.com/milosh16/Day-Trading/actions/workflows/train-conviction.yml"

      - name: Print summary
        if: always()
        run: |
          echo "=== Training Summary ==="
          if [ -f training/results/training-state.json ]; then
            node -e "
              const s = require('./training/results/training-state.json');
              console.log('Trials completed:', s.currentTrial);
              console.log('Best score:', s.bestScore);
              console.log('Total tokens:', s.totalTokensUsed?.toLocaleString());
              console.log('Best weights:', JSON.stringify(s.bestWeights, null, 2));
            "
          else
            echo "No training state found"
          fi
          echo ""
          echo "=== Last 30 log lines ==="
          tail -30 training/results/training-log.txt 2>/dev/null || echo "No log"
